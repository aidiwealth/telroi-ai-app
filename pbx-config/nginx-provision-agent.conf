server {
    listen 8443 ssl;
    server_name sip.telroi.ai;

    ssl_certificate     /etc/letsencrypt/live/sip.telroi.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sip.telroi.ai/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Only proxy the provisioning agent's known endpoints; everything else 404s.
    location = /provision {
        proxy_pass http://127.0.0.1:8090/provision;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location = /deprovision {
        proxy_pass http://127.0.0.1:8090/deprovision;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location = /health {
        proxy_pass http://127.0.0.1:8090/health;
    }
    location = /carrier/upsert {
        proxy_pass http://127.0.0.1:8090/carrier/upsert;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }
    location = /carrier/remove {
        proxy_pass http://127.0.0.1:8090/carrier/remove;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }
    location / { return 404; }
}
